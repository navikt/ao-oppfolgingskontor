apiVersion: kafka.nais.io/v1
kind: Topic
metadata:
  name: arbeidsoppfolgingskontortilordninger-v2
  namespace: dab
  labels:
    team: dab
  annotations:
    kafka.nais.io/removeDataWhenResourceIsDeleted: "true"
spec:
  pool: nav-dev
  config:
    cleanupPolicy: compact
    retentionHours: -1 # evig retention
    deleteRetentionHours: 24
    minimumInSyncReplicas: 1
    partitions: 8
  acl:
    - team: dab
      application: ao-oppfolgingskontor
      access: write
    - team: pto
      application: pto-kafka-manager
      access: read
    - team: poao
      application: veilarboppfolging
      access: read
    - team: teamarenanais
      application: arena-hendelse-q1
      access: read
    - team: teamarenanais
      application: arena-hendelse-q2
      access: read
    - team: teamarenanais
      application: arena-hendelse-q4
      access: read
    - team: teamarenanais
      application: arena-hendelse-u1
      access: read
    - team: teamarenanais
      application: arena-hendelse-u2
      access: read
    - team: teamarenanais
      application: arena-kafka-manager
      access: read
